<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reproductor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .bg {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: blur(70px) brightness(0.45) saturate(1.4);
    transform: scale(1.25);
    z-index: -1;
  }

  /* CONTENEDOR PRINCIPAL */
  .main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .cover {
    width: 80vw;
    max-width: 420px;
    max-height: 60vh; /* CLAVE: nunca ocupa más del 60% de la pantalla */
    border-radius: 10px;
    object-fit: cover;
    box-shadow: 0 25px 60px rgba(0,0,0,0.7);
  }

  /* BARRA INFERIOR */
  .bottom-bar {
    width: 100%;
    padding: 15px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* INFO */
  .info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .info img {
    width: 55px;
    height: 55px;
    border-radius: 6px;
    object-fit: cover;
  }

  .track-title { font-size: 16px; font-weight: 600; }
  .track-artist { font-size: 13px; color: #b3b3b3; }

  /* CONTROLES */
  .controls {
    display: flex;
    justify-content: center;
    gap: 35px;
    align-items: center;
  }

  .ctrl-medium svg {
    width: 26px;
    height: 26px;
    fill: #fff;
  }

  .ctrl-play {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .ctrl-play svg {
    width: 30px;
    height: 30px;
    fill: #000;
  }

  /* PROGRESO */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 90%;
    margin: 0 auto;
    font-size: 12px;
    color: #b3b3b3;
  }

  .progress {
    flex: 1;
    -webkit-appearance: none;
    height: 6px;
    background: #535353;
    border-radius: 3px;
  }

  .progress::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #1db954;
    border-radius: 50%;
    cursor: pointer;
    margin-top: -5px;
  }
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="main">
  <img src="portada.jpg" class="cover" id="cover">
</div>

<div class="bottom-bar">

  <div class="info">
    <img src="portada.jpg" id="miniCover">
    <div>
      <div class="track-title" id="title">Tu Canción</div>
      <div class="track-artist" id="artist">Tu Nombre</div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-medium">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
    </button>

    <button class="ctrl-play" id="play">
      <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <button class="ctrl-medium">
      <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
    </button>
  </div>

  <div class="progress-row">
    <span id="current">0:00</span>
    <input type="range" id="progress" class="progress" min="0" max="100" value="0">
    <span id="duration">0:00</span>
  </div>

</div>

<audio id="audio" src="tu-cancion.mp3" preload="metadata"></audio>

<script>
  const audio = document.getElementById("audio");
  const playBtn = document.getElementById("play");
  const playIcon = document.getElementById("playIcon");
  const progress = document.getElementById("progress");
  const current = document.getElementById("current");
  const duration = document.getElementById("duration");
  const bg = document.getElementById("bg");
  const cover = document.getElementById("cover");
  const miniCover = document.getElementById("miniCover");

  let playing = false;

  playBtn.addEventListener("click", () => {
    if (playing) {
      audio.pause();
      playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    } else {
      audio.play();
      playIcon.innerHTML = '<path d="M6 19h4V5H6zm8-14h4v14h-4z"/>';
    }
    playing = !playing;
  });

  audio.addEventListener("loadedmetadata", () => {
    duration.textContent = format(audio.duration);
  });

  audio.addEventListener("timeupdate", () => {
    progress.value = (audio.currentTime / audio.duration) * 100;
    current.textContent = format(audio.currentTime);
  });

  progress.addEventListener("input", () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
  });

  function format(sec) {
    if (isNaN(sec)) return "0:00";
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${s.toString().padStart(2, "0")}`;
  }

  function aplicarFondo() {
    bg.style.backgroundImage = `url('${cover.src}')`;
    miniCover.src = cover.src;
  }

  if (cover.complete) aplicarFondo();
  cover.onload = aplicarFondo;
</script>

</body>
</html>
